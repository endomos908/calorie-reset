  <!-- Heart symbol -->
  <path d="M100 140 L70 110 Q60 100 60 85 Q60 70 70 60 Q80 50 95 50 Q100 50 100 55 Q100 50 105 50 Q120 50 130 60 Q140 70 140 85 Q140 100 130 110 Z" 
        fill="#38bdf8" 
